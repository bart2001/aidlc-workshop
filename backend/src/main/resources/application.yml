server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tableorder}
    username: ${DB_USERNAME:tableorder}
    password: ${DB_PASSWORD:tableorder}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-minimum-256-bits-long-do-not-use-in-production-1234567890}
  expiration: 57600000  # 16시간

management:
  endpoints:
    web:
      exposure:
        include: health
